{% set name = "usgscsm" %}
{% set version = "2.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

# ASP build: EXTERNAL_DEPS=ON. Source = DOI-USGS/usgscsm main @ 74fa08f (12
# commits past the 2.0.2 tag), which has our merged work: #506 (J2000), #505
# (KPLO ShadowCam distortion), #501 (binary model state). Uses conda
# csm/eigen/nlohmann_json/proj (matching isis_dev), NOT the upstream recipe's
# vendored internal deps. build.sh also patches out the vendored-spdlog install
# so it does not clobber the env's conda spdlog.
source:
  git_url: https://github.com/DOI-USGS/usgscsm.git
  git_rev: 74fa08fdd8bba84e777f0efe29d3e66d59f02b3e

build:
  number: 1          # asp_0 was published but had a wrong proj run-export pin
  string: asp_1      # bumped (append-only): asp_0 stays on channel, asp_1 is the fix
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('cxx') }}
    # ASP: {{ stdlib("c") }} removed (expands to bogus c_osx-arm64 in our local
    # conda-build; the cxx compiler activation brings the macOS sysroot).
    - cmake >=3.10,<4.0.0
    - make
  host:
    # EXTERNAL deps - conda packages matching isis_dev (find_package'd by the
    # USGSCSM_EXTERNAL_DEPS=ON path). spdlog is NOT here: usgscsm always uses
    # its vendored spdlog at build time; we only suppress INSTALLING it.
    # ale: usgscsm DOES depend on ALE's C++ headers - Utilities.cpp uses
    # ale::DistortionType::KPLOSHADOWCAM (added by ALE #709). Must be OUR ale
    # (1.2.0=asp_0 has the enum; pin to our channel - listed first). This is
    # the "pin usgscsm to our ale" Oleg called for.
    - ale 1.2.0
    - csm >=3.0.3,<3.0.4
    - eigen >=3,<4
    - nlohmann_json =3.11.2
    - proj >=9.7,<9.8   # match isis_dev 9.7.1 (unpinned pulled 9.8 -> run_export conflict)
    - sqlite  # [linux]
  run:
    - ale 1.2.0
    - csm >=3.0.3,<3.0.4
    - proj >=9.7,<9.8
    # ensure the env has conda spdlog for usgscsm's installed headers, since we
    # no longer install the vendored copy.
    - spdlog
    - sqlite  # [linux]

test:
  commands:
    - test -e $PREFIX/lib/csmplugins/libusgscsm${SHLIB_EXT}  # [unix]

about:
  home: http://github.com/DOI-USGS/usgscsm
  license: CC0-1.0
  license_file: LICENSE.md
  summary: USGS Astrogeology developed Community Sensor Model implementations
  description: |
    The USGS Astrogeology CSM compliant sensor models for surface planetary
    science applications.
  dev_url: https://github.com/DOI-USGS/usgscsm

extra:
  recipe-maintainers:
    - jlaura
    - acpaquette
    - chkim-usgs
    - Kelvinrr
